backend:
  name: github
  repo: adhamh4mza-hash/unspokenmelodies
  branch: main
  base_url: https://unspokenmelodies-oauth-production.up.railway.app

media_folder: "images"
public_folder: "/images"

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Site Settings"
        name: "settings"
        file: "settings.json"
        fields:
          - { label: "Page Title", name: "page_title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - { label: "Intro Paragraph", name: "intro", widget: "text" }
          - { label: "Pull Quote", name: "pullquote", widget: "string" }
          - { label: "Location", name: "location", widget: "string" }
          - { label: "Total Price (EGP)", name: "price_total", widget: "string" }
          - { label: "Deposit Price (EGP)", name: "price_deposit", widget: "string" }
          - { label: "Footer Text", name: "footer_text", widget: "string" }
          - { label: "Background Color", name: "bg_color", widget: "color" }
          - { label: "Accent Color", name: "accent_color", widget: "color" }
          - label: "Heading Font"
            name: "heading_font"
            widget: "select"
            default: "Cormorant Garamond"
            options:
              - { label: "Cormorant Garamond (elegant serif)", value: "Cormorant Garamond" }
              - { label: "Playfair Display (bold serif)", value: "Playfair Display" }
              - { label: "Lora (warm serif)", value: "Lora" }
              - { label: "Libre Baskerville (classic serif)", value: "Libre Baskerville" }
              - { label: "Josefin Sans (modern sans)", value: "Josefin Sans" }
          - label: "Body Font"
            name: "body_font"
            widget: "select"
            default: "Jost"
            options:
              - { label: "Jost (clean modern)", value: "Jost" }
              - { label: "Inter (neutral)", value: "Inter" }
              - { label: "DM Sans (geometric)", value: "DM Sans" }
              - { label: "Nunito (rounded)", value: "Nunito" }
              - { label: "Raleway (elegant sans)", value: "Raleway" }
